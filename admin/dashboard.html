<!doctype html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
      .admin-wrap{max-width:1100px;margin:28px auto;padding:18px}
      .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
      .news-list{display:grid;gap:12px}
      .news-item{background:#fff;padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
      .news-meta{max-width:70%}
      .controls button{margin-left:8px}
      form.add-form{background:#fff;padding:12px;border-radius:8px;margin-bottom:16px}
      label{display:block;margin-bottom:8px}
      input[type=text],textarea{width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:6px}
      .row{display:flex;gap:8px}
      @media(max-width:720px){.row{flex-direction:column}}
    </style>
  </head>
  <body>
    <a class="back-link" href="/index.html" aria-label="Back to homepage" style="position:fixed;top:18px;left:18px;display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:transparent;color:var(--primary);text-decoration:none;border:1px solid rgba(30,136,229,0.08);font-weight:600"> 
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke="#1E88E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Буцах
    </a>

    <div class="admin-wrap">
      <div class="top" style="align-items:center;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">А</div>
          <div>
            <div style="font-weight:700">Админ хэрэглэгч</div>
            <div style="font-size:13px;color:#666">Нэвтэрсэн статустай</div>
          </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          <button id="editHome" class="btn-ghost">Нүүр хуудас засах</button>
          <a href="/admin/logout" class="btn-ghost">Logout</a>
        </div>
      </div>

      <section style="margin-top:18px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3 style="margin:0;color:var(--primary)">Мэдээ мэдээлэл удирдах</h3>
          <div>
            <button id="addNews" class="btn-primary">+ Мэдээ нэмэх</button>
          </div>
        </div>
        <div class="news-list" id="list"></div>
      </section>
    </div>

    <script src="/components/modal.js" defer></script>
    <script src="/admin/admin.js" defer></script>
  </body>
</html>
