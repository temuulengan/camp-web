<!doctype html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Мэдээ мэдээлэл</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .news-grid{display:grid;gap:18px;grid-template-columns:repeat(3,1fr)}
      @media(max-width:1000px){.news-grid{grid-template-columns:repeat(2,1fr)}}
      @media(max-width:640px){.news-grid{grid-template-columns:1fr}}
      .news-card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 12px 30px rgba(14,54,114,0.06);transition:transform .18s,box-shadow .18s}
      .news-card:hover{transform:translateY(-6px);box-shadow:0 22px 48px rgba(14,54,114,0.12)}
      .news-card .thumb{height:180px;overflow:hidden}
      .news-card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
      .news-card .body{padding:14px}
      .news-card h4{margin:0 0 8px;color:var(--primary)}
      .news-card p{margin:0 0 12px;color:#444}
      .news-meta{font-size:13px;color:#777;margin-bottom:8px}
    </style>
  </head>
  <body>
    <header>
      <div class="container navbar">
        <a class="logo" href="/index.html">
          <img src="/images/Untitled design (5).png" alt="logo" />
          <span class="logo-text">Багабаян-Энхийн төлөө цогцолбор төв</span>
        </a>
        <ul class="nav-links">
          <li><a href="/pages/about.html">Бидний тухай</a></li>
          <li><a href="/news.html" class="active">Мэдээ мэдээлэл</a></li>
        </ul>
        <a class="profile-icon" id="navProfile" href="/admin/login.html" style="margin-left:12px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 12c2.7614 0 5-2.2386 5-5s-2.2386-5-5-5-5 2.2386-5 5 2.2386 5 5 5z" fill="#1E88E5" />
            <path d="M4 20c0-4.4183 3.5817-8 8-8s8 3.5817 8 8v1H4v-1z" fill="#4FC3F7" />
          </svg>
        </a>
      </div>
    </header>

    <main class="container" style="padding-top:36px">
      <section class="section">
        <h2 class="section-title">Мэдээ мэдээлэл</h2>
        <p class="section-subtitle">Шинээр нэмэгдсэн, онцлох мэдээллийг эндээс үзнэ үү.</p>
        <div id="grid" class="news-list"></div>
      </section>
    </main>

    <div id="newsModalPlaceholder"></div>

    <style>
      .news-list{display:flex;flex-direction:column;gap:36px;padding-top:8px}
      .news-item{display:flex;gap:20px;background:var(--white);border-radius:12px;padding:18px;align-items:flex-start;box-shadow:0 12px 30px rgba(14,54,114,0.06);transition:transform .18s,box-shadow .18s}
      .news-item.featured{padding:22px}
      .news-item:hover{transform:translateY(-6px);box-shadow:0 22px 48px rgba(14,54,114,0.12)}
      .news-image{flex:0 0 360px;border-radius:12px;overflow:hidden;height:220px}
      .news-image img{width:100%;height:100%;object-fit:cover;display:block}
      .news-image .image-placeholder{width:100%;height:100%;background:#f4f7fb;border-radius:12px}
      .news-content{flex:1;display:flex;flex-direction:column;gap:10px}
      .meta-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
      .badge{background:var(--primary);color:#fff;padding:6px 10px;border-radius:999px;font-size:13px;font-weight:700}
      .news-title{font-size:1.35rem;margin:0;color:#8B0000;font-weight:800}
      .byline{font-size:13px;color:#6b6b6b}
      .preview{color:#333;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
      .actions{margin-top:auto;text-align:right}
      .actions .button{padding:8px 12px;border-radius:8px}
      @media(max-width:800px){.news-item{flex-direction:column}.news-image{width:100%;height:220px}}
    </style>

    <script src="/components/modal.js"></script>
    <script src="/js/news.js"></script>
    <script>
      (function(){
        const p = document.getElementById('navProfile'); if(!p) return; p.href = '/admin/login.html';
        async function check(){ try{ const r = await fetch('/api/auth/check',{credentials:'include'}); if(!r.ok) return; const j = await r.json(); p.dataset.auth = j.authenticated ? 'true':'false'; }catch(e){ p.dataset.auth='false'; } }
        p.addEventListener('click', async (ev)=>{ ev.preventDefault(); try{ const r = await fetch('/api/auth/check',{credentials:'include'}); if(r.ok){ const j = await r.json(); if(j.authenticated) return window.location.href='/admin/dashboard.html'; } }catch(e){} window.location.href='/admin/login.html'; });
      })();
    </script>
  </body>
</html>
