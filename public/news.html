<!doctype html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Мэдээ мэдээлэл</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
      .news-wrap{max-width:1100px;margin:28px auto;padding:18px}
      .news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
      .news-card{background:#fff;padding:14px;border-radius:10px;box-shadow:0 8px 20px rgba(14,54,114,0.06)}
      .news-card img{width:100%;height:160px;object-fit:cover;border-radius:8px}
      .news-card h3{color:#1E88E5}
    </style>
  </head>
  <body>
    <main class="news-wrap">
      <h1 style="color:#1E88E5">Мэдээ мэдээлэл</h1>
      <div id="list" class="news-grid"></div>
    </main>

    <script>
      async function load(){
        const res = await fetch('/api/news', { credentials: 'include' });
        const data = await res.json();
        const list = document.getElementById('list');
        list.innerHTML = '';
        data.forEach(item=>{
          const c = document.createElement('article'); c.className='news-card';
          if(item.image) c.innerHTML = `<img src='${item.image.replace(/^\//,'/')}' alt=''>`;
          c.innerHTML += `<h3>${item.title}</h3><div style='font-size:13px;color:#666'>${new Date(item.createdAt).toLocaleString()}</div><p>${(item.content||'').slice(0,240)}</p>`;
          list.appendChild(c);
        });
      }
      load();
    </script>
  </body>
</html>
